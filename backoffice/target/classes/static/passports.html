<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Passeports - Ministère des Visas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body data-page="passports">
    <!-- Header -->
    <header class="header">
        <h1>
            <a href="index.html" style="color: white; text-decoration: none;">
                🏛️ Ministère des Visas
            </a>
            <span style="font-size: 0.6rem; opacity: 0.8;">Gestion des Passeports</span>
        </h1>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">🏠 Accueil</a></li>
                <li><a href="demandeurs.html">👥 Demandeurs</a></li>
                <li><a href="passports.html" class="active">🛂 Passeports</a></li>
                <li><a href="demandes.html">📋 Demandes</a></li>
                <li><a href="visas.html">🎟️ Visas Simples</a></li>
                <li><a href="visas-transformables.html">🔄 Visas Transf.</a></li>
                <li><a href="cartes-residence.html">🪪 Cartes Résid.</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Search and Actions -->
        <section class="search-container">
            <div class="search-filters">
                <input type="text" id="searchInput" class="search-input" placeholder="Rechercher par numéro...">
                <button class="btn btn-primary" onclick="passportManager.searchPassports()">🔍 Rechercher</button>
                <button class="btn btn-success" onclick="passportManager.showPassportForm()">➕ Ajouter</button>
            </div>
        </section>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Table -->
        <section class="table-container">
            <table class="table" id="passportsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Numéro</th>
                        <th>Délivré le</th>
                        <th>Expire le</th>
                        <th>Demandeur</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="text-center">
                            <div class="loading"></div>
                            <p>Chargement des passeports...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal -->
    <div id="passportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Ajouter un Passeport</h2>
                <button class="close-btn" onclick="passportManager.closeModal()">&times;</button>
            </div>
            <form id="passportForm" onsubmit="event.preventDefault(); passportManager.submitForm();">
                <div class="form-group">
                    <label for="numero">Numéro de Passeport *</label>
                    <input type="text" id="numero" name="numero" required>
                </div>
                
                <div class="form-group">
                    <label for="delivreLe">Délivré le *</label>
                    <input type="date" id="delivreLe" name="delivreLe" required>
                </div>
                
                <div class="form-group">
                    <label for="expireLe">Expire le *</label>
                    <input type="date" id="expireLe" name="expireLe" required>
                </div>
                
                <div class="form-group">
                    <label for="demandeur">Demandeur *</label>
                    <select id="demandeur" name="demandeur" required>
                        <option value="">Sélectionner...</option>
                    </select>
                </div>
                
                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                    <button type="button" class="btn btn-secondary" onclick="passportManager.closeModal()">❌ Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/passports.js"></script>
</body>
</html>
